<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <title>Sravanam — Vedic Meditation</title>
    <meta
      name="description"
      content="Binaural-beat meditation with Vedic intentions, Saptaswar frequencies, and a living Sri Yantra mandala."
    />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="mask-icon" href="/icon.svg" color="#d4a574" />

    <!-- Theme / status bar colors (matches manifest background) -->
    <meta name="theme-color" content="#0c1028" />
    <meta name="color-scheme" content="dark light" />

    <!-- iOS: enable standalone mode + match dark meditative shell -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sravanam" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="Sravanam — Vedic Meditation" />
    <meta property="og:description" content="Binaural-beat meditation, Vedic intentions, living Sri Yantra mandala." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <style>
      html,
      body {
        background: #ffffff;
        color: #1d1d1f;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #000000;
          color: #f5f5f7;
        }
      }

      .app-boot {
        box-sizing: border-box;
        min-height: 100svh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        color: inherit;
        background:
          radial-gradient(circle at top, rgba(0, 113, 227, 0.08), transparent 42%),
          radial-gradient(circle at bottom right, rgba(212, 165, 116, 0.08), transparent 30%),
          linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(245, 245, 247, 1) 100%);
      }

      @media (prefers-color-scheme: dark) {
        .app-boot {
          background:
            radial-gradient(circle at top, rgba(10, 132, 255, 0.14), transparent 42%),
            radial-gradient(circle at bottom right, rgba(212, 165, 116, 0.12), transparent 30%),
            linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(28, 28, 30, 1) 100%);
        }
      }

      .app-boot__title {
        font-weight: 700;
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        margin: 0;
        letter-spacing: -0.03em;
      }

      .app-boot__status {
        font-size: 0.75rem;
        margin: 0;
        opacity: 0.72;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#app-screen">Skip to content</a>
    <div id="app-global-viz" aria-hidden="true"></div>
    <div id="app">
      <div id="app-screen" role="main">
        <div class="app-boot">
          <p class="app-boot__title">Sravanam</p>
          <p class="app-boot__status">Awakening</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
