<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Sravanam</title>

    <style>
      html,
      body {
        background: #ffffff;
        color: #1d1d1f;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background: #000000;
          color: #f5f5f7;
        }
      }

      .app-boot {
        box-sizing: border-box;
        min-height: 100svh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        color: inherit;
        background:
          radial-gradient(circle at top, rgba(0, 113, 227, 0.08), transparent 42%),
          radial-gradient(circle at bottom right, rgba(212, 165, 116, 0.08), transparent 30%),
          linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(245, 245, 247, 1) 100%);
      }

      @media (prefers-color-scheme: dark) {
        .app-boot {
          background:
            radial-gradient(circle at top, rgba(10, 132, 255, 0.14), transparent 42%),
            radial-gradient(circle at bottom right, rgba(212, 165, 116, 0.12), transparent 30%),
            linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(28, 28, 30, 1) 100%);
        }
      }

      .app-boot__title {
        font-weight: 700;
        font-size: clamp(1.75rem, 5vw, 2.5rem);
        margin: 0;
        letter-spacing: -0.03em;
      }

      .app-boot__status {
        font-size: 0.75rem;
        margin: 0;
        opacity: 0.72;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#app-screen">Skip to content</a>
    <div id="app-global-viz" aria-hidden="true"></div>
    <div id="app">
      <div id="app-screen" role="main">
        <div class="app-boot">
          <p class="app-boot__title">Sravanam</p>
          <p class="app-boot__status">Awakening</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
